name: Setup Node.js
description: Setup Node.js and pnpm

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 10.11.0

      # Cache node_modules
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        cache: 'pnpm'

    - run: pnpm install
      shell: bash
